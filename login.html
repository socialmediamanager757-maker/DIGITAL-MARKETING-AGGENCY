<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | NexAds Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ff6b2b;--secondary:#ff3d71;--dark:#0a0a0f;--dark2:#111118;--dark3:#1a1a28;
  --border:rgba(255,255,255,0.08);--text:#e8e8f0;--text-muted:#9090a8;
  --gradient:linear-gradient(135deg,var(--primary),var(--secondary));
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
body{font-family:var(--font-b);background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.bg-orbs{position:fixed;inset:0;z-index:-1;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;}
.orb1{width:500px;height:500px;background:var(--primary);top:-150px;right:-100px;}
.orb2{width:400px;height:400px;background:var(--secondary);bottom:-100px;left:-100px;}

.login-box{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:28px;padding:3rem;width:100%;max-width:440px;
  backdrop-filter:blur(20px);
}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-logo .icon{font-size:3rem;}
.login-logo h1{font-family:var(--font-d);font-size:1.8rem;font-weight:800;margin-top:0.5rem;}
.login-logo h1 span{background:var(--gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.login-logo p{color:var(--text-muted);font-size:0.9rem;margin-top:0.3rem;}

.form-group{margin-bottom:1.2rem;}
.form-group label{display:block;font-size:0.85rem;font-weight:600;color:var(--text-muted);margin-bottom:0.5rem;}
.form-group input{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:12px;padding:0.85rem 1rem;color:white;
  font-family:var(--font-b);font-size:0.95rem;outline:none;transition:border-color 0.2s;
}
.form-group input:focus{border-color:var(--primary);}

.hint{background:rgba(255,107,43,0.08);border:1px solid rgba(255,107,43,0.2);
  border-radius:10px;padding:0.75rem 1rem;margin-bottom:1.5rem;
  font-size:0.82rem;color:var(--text-muted);}
.hint strong{color:var(--primary);}

.btn-login{
  width:100%;padding:1rem;border-radius:12px;border:none;
  background:var(--gradient);color:white;
  font-family:var(--font-b);font-weight:700;font-size:1rem;
  cursor:pointer;transition:all 0.3s;
  box-shadow:0 0 30px rgba(255,107,43,0.3);
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(255,107,43,0.5);}
.error{color:#ff6b6b;font-size:0.85rem;text-align:center;margin-top:0.75rem;display:none;}
.back-link{text-align:center;margin-top:1.5rem;}
.back-link a{color:var(--text-muted);text-decoration:none;font-size:0.85rem;transition:color 0.2s;}
.back-link a:hover{color:var(--primary);}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="login-box">
  <div class="login-logo">
    <div class="icon">⚡</div>
    <h1>NexAds<span>Pro</span> Admin</h1>
    <p>Customer Management Dashboard</p>
  </div>
  <div class="hint">
    🔑 Demo Login: <strong>admin</strong> / <strong>nexads2025</strong>
  </div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" value="admin">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" value="nexads2025">
  </div>
  <button class="btn-login" onclick="doLogin()">🔐 Login to Dashboard</button>
  <div class="error" id="errMsg">❌ Wrong username or password!</div>
  <div class="back-link"><a href="../index.html">← Back to Website</a></div>
</div>
<script>
function doLogin(){
  const u=document.getElementById('username').value;
  const p=document.getElementById('password').value;
  if(u==='admin'&&p==='nexads2025'){
    sessionStorage.setItem('nexads_admin','true');
    window.location.href='dashboard.html';
  }else{
    document.getElementById('errMsg').style.display='block';
    setTimeout(()=>document.getElementById('errMsg').style.display='none',3000);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
